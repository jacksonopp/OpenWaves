domain: "localhost:8080"
scheme: "http"
registration: "open"
keys_dir: keys
admin_key: "secret"  # set a secret to enable the /admin API and TUI control
territory: "*"        # this server broadcasts worldwide

stations:
  - username: "morning-vibes"
    name: "Morning Vibes Radio"
    summary: "Indie folk and acoustic sets, live every morning."
    license_territory: ["US", "CA"]
    relay_policy: "open"
    ingest_type: "http"

  - username: "wfmu"
    name: "WFMU"
    summary: "Freeform radio from Jersey City, NJ. Listener-supported."
    license_territory: ["*"]
    relay_policy: "open"
    ingest_type: "http"
